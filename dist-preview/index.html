</span> </div> </a> </div> <footer class="text-center text-xs text-gray-400 pt-4"> <p>Built by Brooklyn Strategic</p> </footer> </div> </div> </div>  <!-- Lightbox Modal --> <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/90 items-center justify-center" onclick="if(event.target===this)closeLightbox()"> <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-4xl font-light hover:text-gray-300 z-50 leading-none" aria-label="Close">&times;</button> <button onclick="prevImage()" class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-5xl font-light hover:text-gray-300 z-50 leading-none" aria-label="Previous">&lsaquo;</button> <button onclick="nextImage()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white text-5xl font-light hover:text-gray-300 z-50 leading-none" aria-label="Next">&rsaquo;</button> <img loading="lazy" id="lightbox-img" src="" alt="" class="max-h-[90vh] max-w-[90vw] object-contain"> </div> <script>
      let lightboxImages = [];
      let currentIndex = 0;

      document.addEventListener('DOMContentLoaded', () => {
        const galleryItems = document.querySelectorAll('[data-lightbox]');
        galleryItems.forEach((item, i) => {
          item.style.cursor = 'pointer';
          item.addEventListener('click', () => openLightbox(i));
        });
        lightboxImages = Array.from(galleryItems).map(el => ({
          src: el.querySelector('img')?.src || el.src,
          alt: el.querySelector('img')?.alt || el.alt || ''
        }));
      });

      function openLightbox(index) {
        currentIndex = index;
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = lightboxImages[index].src;
        img.alt = lightboxImages[index].alt;
        lb.classList.remove('hidden');
        lb.classList.add('flex');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.add('hidden');
        lb.classList.remove('flex');
        document.body.style.overflow = '';
      }

      function prevImage() {
        currentIndex = (currentIndex - 1 + lightboxImages.length) % lightboxImages.length;
        const img = document.getElementById('lightbox-img');
        img.src = lightboxImages[currentIndex].src;
        img.alt = lightboxImages[currentIndex].alt;
      }

      function nextImage() {
        currentIndex = (currentIndex + 1) % lightboxImages.length;
        const img = document.getElementById('lightbox-img');
        img.src = lightboxImages[currentIndex].src;
        img.alt = lightboxImages[currentIndex].alt;
      }

      document.addEventListener('keydown', (e) => {
        const lb = document.getElementById('lightbox');
        if (lb.classList.contains('hidden')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      });
    </script> </body> </html>
